<!DOCTYPE html>
<html>
<head>
    <title>Financial Habit Builder</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root { --bg: #1e1e2f; --card: rgba(255, 255, 255, 0.08); --text: white; --accent: #00c6ff; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1e1e2f, #2a2a40); margin: 0; color: var(--text); overflow-x: hidden; }
        
        header { padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .container { padding: 20px; max-width: 1200px; margin: auto; }

        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 20px; }

        .card { background: var(--card); padding: 15px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .card h3, .card h4 { margin-top: 0; color: var(--accent); }

        input, select { 
            width: calc(100% - 22px); 
            padding: 10px; 
            margin: 5px 0; 
            border-radius: 8px; 
            border: 1px solid rgba(255,255,255,0.2); 
            background: #2a2a40; 
            color: white; 
            font-size: 14px;
        }
        
        select option { background: #2a2a40; color: white; }

        button { padding: 10px 15px; border-radius: 8px; border: none; background: var(--accent); color: white; cursor: pointer; font-weight: bold; margin-top: 5px; transition: 0.2s; }
        button:hover { opacity: 0.8; }
        .btn-row { display: flex; gap: 10px; margin-bottom: 20px; }

        .mid-section { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; align-items: start; }
        
        #historyList { max-height: 250px; overflow-y: auto; padding: 0; list-style: none; scrollbar-width: thin; }
        
        .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .chart-box { background: var(--card); padding: 10px; border-radius: 15px; text-align: center; height: 320px; display: flex; flex-direction: column; align-items: center; }
        canvas { width: 100% !important; max-height: 240px; }

        .history-header { display: flex; align-items: center; cursor: pointer; margin-bottom: 10px; }
        .arrow { font-size: 20px; margin-right: 8px; transition: 0.3s; color: var(--accent); }
        .arrow.open { transform: rotate(90deg); }

        table { width: 100%; margin-top: 20px; border-collapse: collapse; font-size: 13px; background: var(--card); border-radius: 10px; overflow: hidden; }
        th, td { border: 1px solid rgba(255,255,255,0.1); padding: 8px; text-align: center; }

        #authOverlay { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .auth-card { background: var(--card); padding: 40px; border-radius: 20px; text-align: center; width: 300px; }

        .light-mode { background: #f0f2f5; color: #333; }
        .light-mode .card, .light-mode .chart-box, .light-mode header, .light-mode table { background: white; color: #333; border: 1px solid #ddd; }
        .light-mode input, .light-mode select { background: #fff; color: #333; border: 1px solid #ccc; }
        
        /* PDF specific tweaks to avoid black blocks */
        .pdf-export-mode { background: #1e1e2f !important; color: white !important; }

        @media (max-width: 800px) { .mid-section { grid-template-columns: 1fr; } .charts-row { grid-template-columns: 1fr; } }
    </style>
</head>

<body>

<div id="authOverlay">
    <div class="auth-card">
        <h2>Finance Tracker</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()" style="width:100%">Login</button>
        <button onclick="signup()" style="width:100%; background: #6e8efb; margin-top: 10px;">Sign Up</button>
    </div>
</div>

<header>
    <span id="welcomeText" style="font-size: 20px;">Fin-Habit Builder</span>
    <div>
        <button onclick="toggleTheme()" id="themeBtn">🌙 Dark</button>
        <button style="background:#555" onclick="logout()">Logout</button>
    </div>
</header>

<div class="container" id="mainApp" style="display:none">
    <div class="btn-row">
        <button onclick="downloadCSV()">Excel</button>
        <button onclick="downloadPDF()">Export PDF</button>
        <button style="background:#ff4b2b" onclick="resetData()">Reset Data</button>
    </div>

    <div class="dashboard-grid">
        <div class="card" style="border-left: 5px solid #00c6ff"><h4>Total Income</h4><h2 id="income">₹0</h2></div>
        <div class="card" style="border-left: 5px solid #ff4b2b"><h4>Total Expenses</h4><h2 id="expense">₹0</h2></div>
        <div class="card" style="border-left: 5px solid #4bc0c0"><h4>Savings</h4><h2 id="savings">₹0</h2></div>
    </div>

    <div class="dashboard-grid">
        <div class="card">
            <h3>+ Add Income</h3>
            <input type="number" id="incomeInput" placeholder="Amount">
            <button onclick="addIncome()" style="width:100%">Add Income</button>
        </div>
        <div class="card">
            <h3>- Add Expense</h3>
            <div style="display: flex; gap: 5px;">
                <input type="number" id="expenseInput" placeholder="Amount">
                <select id="category">
                    <option>Food</option><option>Rent</option><option>Travel</option><option>Bills</option><option>Misc</option>
                </select>
                <select id="month">
                    <option>Jan</option><option>Feb</option><option>Mar</option><option>Apr</option><option>May</option><option>Jun</option><option>Jul</option><option>Aug</option><option>Sep</option><option>Oct</option><option>Nov</option><option>Dec</option>
                </select>
            </div>
            <button onclick="addExpense()" style="width:100%">Add Expense</button>
        </div>
    </div>

    <div class="mid-section" id="captureArea">
        <div class="card" style="height: 320px;">
            <div class="history-header" onclick="toggleHistory()">
                <span id="historyArrow" class="arrow">▶</span>
                <h3 style="margin:0">History</h3>
            </div>
            <ul id="historyList"></ul>
        </div>
        
        <div class="charts-row">
            <div class="chart-box">
                <h4>Categories</h4>
                <div style="width: 100%; height: 240px;"><canvas id="myChart"></canvas></div>
            </div>
            <div class="chart-box">
                <h4>Monthly</h4>
                <div style="width: 100%; height: 240px;"><canvas id="monthlyChart"></canvas></div>
            </div>
        </div>
    </div>

    <div style="overflow-x: auto; margin-top: 20px;">
        <table id="fullTable">
            <thead>
                <tr><th>Category</th><th>Jan</th><th>Feb</th><th>Mar</th><th>Apr</th><th>May</th><th>Jun</th><th>Jul</th><th>Aug</th><th>Sep</th><th>Oct</th><th>Nov</th><th>Dec</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
let currentUser = null;
let historyExpanded = false;
let myChart = null, monthlyChart = null;

const emptyData = {
    totalIncome: 0, totalExpense: 0, transactions: [],
    categoryData: { Food: 0, Rent: 0, Travel: 0, Bills: 0, Misc: 0 },
    monthlyData: { Jan:0, Feb:0, Mar:0, Apr:0, May:0, Jun:0, Jul:0, Aug:0, Sep:0, Oct:0, Nov:0, Dec:0 },
    detailedData: {
        Food:{Jan:0,Feb:0,Mar:0,Apr:0,May:0,Jun:0,Jul:0,Aug:0,Sep:0,Oct:0,Nov:0,Dec:0},
        Rent:{Jan:0,Feb:0,Mar:0,Apr:0,May:0,Jun:0,Jul:0,Aug:0,Sep:0,Oct:0,Nov:0,Dec:0},
        Travel:{Jan:0,Feb:0,Mar:0,Apr:0,May:0,Jun:0,Jul:0,Aug:0,Sep:0,Oct:0,Nov:0,Dec:0},
        Bills:{Jan:0,Feb:0,Mar:0,Apr:0,May:0,Jun:0,Jul:0,Aug:0,Sep:0,Oct:0,Nov:0,Dec:0},
        Misc:{Jan:0,Feb:0,Mar:0,Apr:0,May:0,Jun:0,Jul:0,Aug:0,Sep:0,Oct:0,Nov:0,Dec:0}
    }
};
let userData = JSON.parse(JSON.stringify(emptyData));

function signup() {
    let u = document.getElementById("username").value, p = document.getElementById("password").value;
    if(!u || !p) return alert("Enter credentials!");
    let users = JSON.parse(localStorage.getItem("finance_users") || "{}");
    if(users[u]) return alert("User exists!");
    users[u] = { password: p, data: JSON.parse(JSON.stringify(emptyData)) };
    localStorage.setItem("finance_users", JSON.stringify(users));
    alert("Signed up! You can now login.");
}

function login() {
    let u = document.getElementById("username").value, p = document.getElementById("password").value;
    let users = JSON.parse(localStorage.getItem("finance_users") || "{}");
    if(users[u] && users[u].password === p) {
        currentUser = u; userData = users[u].data;
        document.getElementById("authOverlay").style.display = "none";
        document.getElementById("mainApp").style.display = "block";
        document.getElementById("welcomeText").innerText = "Hi, " + u;
        updateUI();
    } else alert("Invalid username or password!");
}

function logout() { location.reload(); }

function save() {
    let users = JSON.parse(localStorage.getItem("finance_users") || "{}");
    users[currentUser].data = userData;
    localStorage.setItem("finance_users", JSON.stringify(users));
}

function updateUI() {
    document.getElementById("income").innerText = "₹" + userData.totalIncome;
    document.getElementById("expense").innerText = "₹" + userData.totalExpense;
    document.getElementById("savings").innerText = "₹" + (userData.totalIncome - userData.totalExpense);
    
    // Reset Charts
    if (myChart) myChart.destroy();
    if (monthlyChart) monthlyChart.destroy();
    
    const isLight = document.body.classList.contains("light-mode");
    const tColor = isLight ? "#333" : "white";

    myChart = new Chart(document.getElementById('myChart'), {
        type: 'doughnut',
        data: { labels: Object.keys(userData.categoryData), datasets: [{ data: Object.values(userData.categoryData), backgroundColor: ['#ff6384','#36a2eb','#ffce56','#4bc0c0','#9966ff'] }] },
        options: { maintainAspectRatio: false, plugins: { legend: { labels: { color: tColor } } } }
    });

    monthlyChart = new Chart(document.getElementById('monthlyChart'), {
        type: 'bar',
        data: { labels: Object.keys(userData.monthlyData), datasets: [{ label: 'Spent', data: Object.values(userData.monthlyData), backgroundColor: '#00c6ff' }] },
        options: { maintainAspectRatio: false, scales: { y: { ticks: {color: tColor} }, x: { ticks: {color: tColor} } } }
    });

    renderHistory();
    document.getElementById("tableBody").innerHTML = Object.keys(userData.detailedData).map(c => `<tr><td>${c}</td>` + Object.values(userData.detailedData[c]).map(v => `<td>${v}</td>`).join('') + `</tr>`).join('');
}

function addIncome() {
    let val = Number(document.getElementById("incomeInput").value);
    if(val <= 0) return;
    userData.totalIncome += val;
    userData.transactions.push({ type: "In", amt: val, date: new Date().toLocaleDateString() });
    document.getElementById("incomeInput").value = "";
    updateUI(); save();
}

function addExpense() {
    let val = Number(document.getElementById("expenseInput").value), cat = document.getElementById("category").value, mon = document.getElementById("month").value;
    if(val <= 0) return;
    userData.totalExpense += val;
    userData.categoryData[cat] += val;
    userData.monthlyData[mon] += val;
    userData.detailedData[cat][mon] += val;
    userData.transactions.push({ type: "Out", amt: val, cat, mon, date: new Date().toLocaleDateString() });
    document.getElementById("expenseInput").value = "";
    updateUI(); save();
}

function toggleHistory() {
    historyExpanded = !historyExpanded;
    document.getElementById("historyArrow").classList.toggle("open");
    renderHistory();
}

function renderHistory() {
    let list = document.getElementById("historyList");
    let items = historyExpanded ? [...userData.transactions].reverse() : [...userData.transactions].reverse().slice(0, 3);
    list.innerHTML = items.map(t => `<li style="font-size:12px; padding:8px; border-bottom:1px solid rgba(255,255,255,0.05)">
        <b>${t.type=="In"?"+":"-"}₹${t.amt}</b> <span style="opacity:0.7">${t.cat||'Income'} | ${t.date}</span>
    </li>`).join('');
    if(!historyExpanded && userData.transactions.length > 3) list.innerHTML += `<p style="text-align:center; font-size:10px; color:#00c6ff">Expand for more</p>`;
}

function toggleTheme() {
    document.body.classList.toggle("light-mode");
    document.getElementById("themeBtn").innerText = document.body.classList.contains("light-mode") ? "☀️ Light" : "🌙 Dark";
    updateUI();
}

function resetData() { if(confirm("This will clear ALL your data. Continue?")) { localStorage.clear(); location.reload(); } }

function downloadCSV() {
    let csv = "Type,Amount,Category,Date\n" + userData.transactions.map(t => `${t.type},${t.amt},${t.cat||''},${t.date}`).join("\n");
    let a = Object.assign(document.createElement("a"), { href: URL.createObjectURL(new Blob([csv], {type:"text/csv"})), download:"Fin_Report.csv" });
    a.click();
}

/* FIXED PDF LOGIC */
function downloadPDF() {
    const mainApp = document.getElementById("mainApp");
    
    // Scale up for better quality
    html2canvas(mainApp, {
        scale: 2,
        useCORS: true,
        backgroundColor: document.body.classList.contains("light-mode") ? "#f0f2f5" : "#1e1e2f"
    }).then(canvas => {
        const imgData = canvas.toDataURL("image/png");
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        
        const imgProps = pdf.getImageProperties(imgData);
        const pdfWidth = pdf.internal.pageSize.getWidth();
        const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
        
        pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
        pdf.save(`${currentUser}_Finance_Report.pdf`);
    });
}
</script>
</body>
</html>
